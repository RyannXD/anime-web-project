<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Vibes Hub 🔥</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>ANIME VIBES HUB</h1>
      <p>Buat yang lagi gabut cari anime mood ✨</p>
    </header>

    <div class="section">
      <h2>🎲 Random Anime Character</h2>
      <button onclick="generateCharacter()">Generate Karakter</button>
      <div id="character-result" class="result"></div>
    </div>

    <div class="section">
      <h2>💬 Anime Quote Hari Ini</h2>
      <button onclick="generateQuote()">Dapetin Quote</button>
      <div id="quote-result" class="result quote"></div>
    </div>

    <div class="section">
      <h2>🌟 Today's Waifu / Husbando</h2>
      <div id="today" class="result"></div>
    </div>

    <footer>
      <p>Made with ❤️ buat sesama otaku • Deploy di Vercel nanti ya!</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
